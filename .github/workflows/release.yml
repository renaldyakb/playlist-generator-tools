name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows
            os: windows-latest
          - platform: Linux
            os: ubuntu-latest
          - platform: macOS
            os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux Tk dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable
        run: |
          python -m PyInstaller --onefile --windowed --name PlaylistGenerator --collect-all tkinterdnd2 --collect-all tinytag --collect-all mutagen playlist_generator.py

      - name: Package Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist\PlaylistGenerator.exe release\PlaylistGenerator-Windows.exe

      - name: Package Linux executable
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cp dist/PlaylistGenerator release/PlaylistGenerator-Linux
          chmod +x release/PlaylistGenerator-Linux

      - name: Package macOS executable
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          if [ -d "dist/PlaylistGenerator.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/PlaylistGenerator.app" "release/PlaylistGenerator-macOS.zip"
          else
            cp dist/PlaylistGenerator release/PlaylistGenerator-macOS
            chmod +x release/PlaylistGenerator-macOS
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlaylistGenerator-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Playlist Generator ${{ github.ref_name }}
          body: |
            Playlist Generator ${{ github.ref_name }}

            Download:
            - Windows: PlaylistGenerator-Windows.exe
            - Linux: PlaylistGenerator-Linux
            - macOS: PlaylistGenerator-macOS.zip atau PlaylistGenerator-macOS

            Fitur:
            - Multi-folder dan multi-file source: tambah beberapa folder/file lalu gabungkan sebelum generate.
            - Daftar sumber file dengan tombol hapus pilihan dan hapus semua.
            - Notifikasi update otomatis dari GitHub saat ada release baru.
            - Tombol Cek Update di header aplikasi.
            - Lock urutan file pada Preview Output.
            - Drag urutan file pada Preview Output dengan indikator visual.
            - Tombol GitHub, Star Repo, dan Latest Release di header aplikasi.
            - Timestamp YouTube untuk file audio dan video.
            - Dukungan musik, gambar, video, dan PDF.
            - Filter dan jumlah file per jenis.
            - Preview tree per jenis file.
            - Output multi-jenis otomatis dipisah ke subfolder.
          files: release-assets/*
